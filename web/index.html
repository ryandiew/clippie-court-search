<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Clippie Court Search</title>
<meta name="theme-color" content="#06070a"/>
<link rel="apple-touch-icon" href="appicon.png"/><link rel="icon" href="appicon.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Fredoka:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--amber:#FED769;--amber2:#FF7D00;--cyan:#5BE0FF;--cyan2:#49B3FE;--ink:#fff;--soft:rgba(255,255,255,.62);--line:rgba(255,255,255,.08)}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{font-family:Inter,-apple-system,sans-serif;-webkit-font-smoothing:antialiased;color:#fff}
  body{background:#080809;min-height:100dvh}
  a{color:inherit;text-decoration:none}
  .wrap{max-width:1100px;margin:0 auto;padding:22px 20px 90px;min-height:100dvh;display:flex;flex-direction:column}

  /* hero (search is the product) */
  .hero{display:flex;flex-direction:column;align-items:center;text-align:center}
  /* home: pin to dead-center of the viewport (footer sits behind at the bottom) */
  .hero.home{position:fixed;inset:0;justify-content:center;padding:0 20px}
  .hero.results{position:static;flex:none;padding-top:8px;align-items:stretch}
  .brand{display:flex;align-items:center;gap:12px;justify-content:center;cursor:pointer}
  .brand .ic{width:44px;height:44px;border-radius:12px;object-fit:cover;background:#000;box-shadow:0 6px 18px rgba(0,0,0,.5)}
  .brand .nm{font-family:Pacifico;font-size:40px;line-height:1;color:#fafafa}
  .hero.results .brand{justify-content:flex-start}
  .hero.results .brand .ic{width:34px;height:34px}
  .hero.results .brand .nm{font-size:27px}
  .headline{font-family:Fredoka;font-weight:500;font-size:clamp(21px,2.7vw,27px);letter-spacing:-.01em;line-height:1.15;margin-top:22px;color:#f2f4f8}
  .hero.results .headline{display:none}

  .searchbar{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);
    border-radius:999px;padding:6px 6px 6px 22px;box-shadow:0 8px 30px rgba(0,0,0,.4);transition:.15s}
  .searchbar:focus-within{border-color:var(--cyan);background:rgba(255,255,255,.08)}
  .hero.home .searchbar{width:min(640px,92vw);margin-top:34px}
  .hero.results .searchbar{width:100%;max-width:680px;margin-top:16px}
  .searchbar .mag{width:20px;height:20px;color:var(--soft);flex:none}
  .searchbar input{all:unset;flex:1;color:#fff;font-size:17px;min-width:0}
  .searchbar input::placeholder{color:rgba(255,255,255,.45)}
  .searchbar .go{display:inline-flex;align-items:center;gap:8px;height:46px;padding:0 22px;border-radius:999px;flex:none;
    background:linear-gradient(135deg,var(--amber),var(--amber2));border:0;cursor:pointer;transition:transform .1s;color:#14100a;font-family:Fredoka,Inter,sans-serif;font-weight:600;font-size:15px;white-space:nowrap}
  .searchbar .go:active{transform:scale(.96)}
  .searchbar .go svg{width:17px;height:17px;fill:#14100a}
  .searchbar .clr{width:34px;height:34px;border-radius:50%;flex:none;display:none;align-items:center;justify-content:center;background:rgba(255,255,255,.09);border:0;cursor:pointer}
  .searchbar .clr svg{width:15px;height:15px;color:var(--soft)}
  .searchbar.has .clr{display:inline-flex}

  .chips{display:flex;flex-wrap:wrap;gap:9px;justify-content:center;margin-top:20px}
  .hero.results .chips{justify-content:flex-start;margin-top:14px}
  .chiplabel{width:100%;color:rgba(255,255,255,.4);font-size:11.5px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-bottom:2px}
  .hero.home .chiplabel{text-align:center}
  .chip{font-size:13.5px;font-weight:500;padding:9px 15px;border-radius:999px;background:rgba(255,255,255,.06);
    color:var(--soft);white-space:nowrap;border:1px solid var(--line);cursor:pointer;transition:.12s}
  .chip:hover{color:#fff;border-color:var(--cyan);background:rgba(91,224,255,.08)}
  .chip.on{background:linear-gradient(135deg,var(--amber),var(--amber2));color:#14100a;border-color:transparent;font-weight:600;padding-right:34px;position:relative}
  .chip.on::after{content:"×";position:absolute;right:13px;top:50%;transform:translateY(-50%);font-size:15px;font-weight:700;opacity:.75}

  .results{margin-top:26px}
  .status{color:var(--soft);font-size:12.5px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;margin:6px 2px 14px;min-height:15px}
  .clipgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:15px}
  .clip{border-radius:16px;overflow:hidden;position:relative;border:1px solid var(--line);background:#11151d;
    box-shadow:0 12px 30px rgba(0,0,0,.5);display:flex;flex-direction:column;cursor:pointer;animation:pop .4s ease both}
  @keyframes pop{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .clip:hover{border-color:rgba(255,255,255,.22);transform:translateY(-2px);transition:.15s}
  .clip .thumb{position:relative;aspect-ratio:16/9;background:#11151d center/cover no-repeat;overflow:hidden}
  .clip .thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;border:0}
  .clip .thumb:after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(4,6,10,.3) 0%,rgba(4,6,10,0) 45%)}
  .clip .ttag{position:absolute;top:9px;left:9px;z-index:1;font-size:10px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;
    padding:5px 9px;border-radius:8px;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);color:var(--amber)}
  .clip .ttag.ga{left:auto;right:9px;color:#14100a;background:linear-gradient(135deg,var(--amber),var(--amber2))}
  .clip .play{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:44px;height:44px;border-radius:50%;z-index:1;
    background:rgba(255,255,255,.95);display:flex;align-items:center;justify-content:center;box-shadow:0 0 24px rgba(0,0,0,.45)}
  .clip .play:after{content:"";border-left:14px solid #0a0c11;border-top:9px solid transparent;border-bottom:9px solid transparent;margin-left:4px}
  .clip .meta{padding:11px 13px 13px;display:flex;align-items:center;justify-content:space-between;gap:8px}
  .clip .who{font-family:Fredoka;font-weight:600;font-size:14.5px;line-height:1.15;min-width:0}
  .clip .mu{color:var(--soft);font-size:11.5px;margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .clip .sc{font-size:11px;font-weight:600;color:#fff;background:rgba(255,255,255,.07);border:1px solid var(--line);border-radius:6px;padding:3px 8px;font-variant-numeric:tabular-nums;flex:none}

  .empty{grid-column:1/-1;color:var(--soft);text-align:center;padding:50px 20px;font-size:14px}
  .loading{color:var(--soft);font-size:13px;padding:30px 4px}
  footer{margin-top:auto;padding-top:40px;color:rgba(255,255,255,.28);font-size:11.5px;text-align:center;font-weight:500}
  footer b{color:rgba(255,255,255,.5);font-weight:600}

  /* ---- TikTok-style clip feed (matches highlights.clippie.app) ---- */
  .ov{position:fixed;inset:0;z-index:100;background:#000;display:none}
  .ov.on{display:block}
  .ov .stage{position:relative;width:100%;height:100dvh;background:#000}
  /* controls + caption stay a readable width and centered even on a wide desktop video */
  .ovctrls,.ovbody{max-width:860px;margin-left:auto;margin-right:auto}
  /* blurred backdrop fills the void behind portrait (9:16) clips — Reels/Shorts style */
  .ovbgimg{position:absolute;inset:0;z-index:0;background-size:cover;background-position:center;filter:blur(38px) brightness(.4);transform:scale(1.18)}
  .ovstagewrap{z-index:1}
  /* desktop: video column full-height + centered on the blurred fill, not a phone-in-a-box */
  @media(min-width:820px){
    .ov .stage{max-width:none}
    .ovstage video{object-fit:contain}
    .ovctrls,.ovbody{width:calc(100dvh * 9 / 16);left:50%;right:auto;transform:translateX(-50%)}
    .swipehint{bottom:150px}
    .ovx,.ovtag{top:calc(20px + env(safe-area-inset-top))}
  }
  .feed{position:absolute;inset:0;overflow-y:scroll;scroll-snap-type:y mandatory;scrollbar-width:none;-webkit-overflow-scrolling:touch;overscroll-behavior-y:contain}
  .feed::-webkit-scrollbar{display:none}
  .slide{position:relative;width:100%;height:100dvh;scroll-snap-align:start;scroll-snap-stop:always;display:flex;flex-direction:column;background:#000}
  .ovstagewrap{position:relative;flex:1;display:flex;align-items:center;justify-content:center;min-height:0;width:100%}
  .ovx{position:absolute;top:calc(14px + env(safe-area-inset-top));left:14px;z-index:8;width:38px;height:38px;border:none;border-radius:50%;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;cursor:pointer;padding:0}
  .ovx svg{width:16px;height:16px;fill:#fff}
  .ovstage{position:relative;width:100%;height:100%;background:#000;overflow:hidden;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .ovstage video{width:100%;height:100%;object-fit:contain;background:#000;display:block}
  .ovbig{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;transition:opacity .2s}
  .ovbig .pc{width:64px;height:64px;border-radius:50%;background:rgba(0,0,0,.5);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center}
  .ovbig .pc svg{width:26px;height:26px;fill:#fff;margin-left:3px}
  .ovstage.playing .ovbig{opacity:0}
  .ovtag{position:absolute;top:calc(14px + env(safe-area-inset-top));right:14px;z-index:6;display:flex;gap:7px}
  .ovtag .t{font-size:11px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;padding:6px 10px;border-radius:8px;background:rgba(0,0,0,.55);backdrop-filter:blur(4px);color:var(--amber)}
  .ovtag .t.ga{color:#14100a;background:linear-gradient(135deg,var(--amber),var(--amber2))}
  .ovctrls{position:absolute;left:0;right:0;bottom:104px;display:flex;align-items:center;gap:10px;padding:10px 16px;z-index:5}
  .ovctrls .ic{all:unset;cursor:pointer;color:#fff;width:26px;text-align:center}
  .ovctrls .ic svg{width:18px;height:18px;fill:#fff;display:block;margin:0 auto}
  .ovbar{flex:1;height:18px;display:flex;align-items:center;cursor:pointer;touch-action:none}
  .ovbar .track{position:relative;width:100%;height:4px;border-radius:99px;background:rgba(255,255,255,.28);overflow:hidden}
  .ovbarf{height:100%;width:0;background:var(--amber);border-radius:99px}
  .ovtime{font-size:11.5px;color:#fff;font-variant-numeric:tabular-nums;min-width:34px;text-align:right}
  .ovbody{position:absolute;left:0;right:0;bottom:0;padding:18px 18px calc(22px + env(safe-area-inset-bottom));z-index:4;background:linear-gradient(180deg,rgba(0,0,0,0),rgba(0,0,0,.86))}
  .ovhead{display:flex;align-items:center;gap:11px}
  .ovav{width:44px;height:44px;flex:none;border-radius:50%;background:#15171c;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-family:Fredoka;font-weight:600;font-size:15px;color:#fff}
  .ovid{flex:1;min-width:0}
  .ovname{font-family:Fredoka;font-weight:600;font-size:16px;line-height:1.15;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ovhandle{font-size:13px;color:var(--soft);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ovsc{font-size:12px;font-weight:700;color:#fff;background:rgba(255,255,255,.14);border-radius:7px;padding:5px 10px;flex:none;font-variant-numeric:tabular-nums}
  .swipehint{position:absolute;left:0;right:0;bottom:168px;text-align:center;color:rgba(255,255,255,.65);font-size:12.5px;font-weight:500;z-index:4;pointer-events:none;animation:fadehint 3.5s ease forwards}
  @keyframes fadehint{0%,55%{opacity:1}100%{opacity:0}}

  /* ---- mobile ---- */
  @media (max-width:560px){
    .wrap{padding:16px 14px 60px}
    .brand{gap:9px}
    .brand .ic{width:34px;height:34px}
    .brand .nm{font-size:29px}
    .headline{font-size:19px;margin-top:15px;padding:0 6px}
    .hero.home{padding:0 16px}
    .hero.home .searchbar{width:100%;margin-top:22px}
    .searchbar{padding:5px 5px 5px 15px;gap:8px}
    .searchbar input{font-size:15px}
    .searchbar .go{height:42px;padding:0 15px;font-size:13.5px;gap:6px}
    /* chips: one tidy swipeable row, full-width so it starts at the first chip
       (align-self:stretch overrides the hero's align-items:center, which was
       centering the overflow and cutting the first chips off the left edge) */
    .chips{align-self:stretch;flex-wrap:nowrap;overflow-x:auto;justify-content:flex-start;margin-top:16px;padding-bottom:6px;-webkit-overflow-scrolling:touch;scrollbar-width:none;mask-image:linear-gradient(90deg,#000 92%,transparent)}
    .chips::-webkit-scrollbar{display:none}
    .chip{flex:none}
    .results{margin-top:18px}
    .clipgrid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:11px}
    footer{font-size:11px;padding-top:28px}
    .ovctrls{bottom:96px}
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="hero home" id="hero">
    <div class="brand" onclick="goHome()">
      <img class="ic" src="appicon.png" alt="Clippie"/>
      <div class="nm">Clippie</div>
    </div>
    <div class="headline">Search basketball like you remember it.</div>
    <div class="searchbar">
      <svg class="mag" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input id="q" placeholder="the three that put HRS ahead late" autocomplete="off"/>
      <button class="clr" onclick="goHome()" aria-label="Clear search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M6 6l12 12M18 6L6 18"/></svg></button>
      <button class="go" onclick="run()" aria-label="Find it"><svg viewBox="0 0 24 24"><path d="M12 2l1.9 5.2L19 9l-5.1 1.8L12 16l-1.9-5.2L5 9l5.1-1.8z"/><path d="M18 14l.8 2.2L21 17l-2.2.8L18 20l-.8-2.2L15 17l2.2-.8z"/></svg>Find it</button>
    </div>
    <div class="chips" id="chips"></div>
  </div>

  <div class="results" id="results"></div>

  <div class="ov" id="ov">
    <div class="stage">
      <button class="ovx" onclick="closeFeed()" aria-label="Close"><svg viewBox="0 0 24 24"><path d="M18.3 5.7a1 1 0 00-1.4 0L12 10.6 7.1 5.7A1 1 0 105.7 7.1L10.6 12l-4.9 4.9a1 1 0 101.4 1.4L12 13.4l4.9 4.9a1 1 0 001.4-1.4L13.4 12l4.9-4.9a1 1 0 000-1.4z"/></svg></button>
      <div class="feed" id="feed"></div>
    </div>
  </div>

  <footer>1,675 real clips · computer vision + <b>Qdrant</b> · Sports World Cup Hackathon 2026</footer>
</div>
<script>
const CHIPS = [
  {t:"every HRS go-ahead bucket"},
  {t:"Nick Taubes vs Emerald"},
  {t:"clutch threes in close games"},
  {t:"Team Cali 16u steals"},
  {t:"Lily Hamblin highlights"},
];
const PLACEHOLDERS = [
  "the three that put HRS ahead late",
  "every bucket that gave HRS the lead",
  "clutch threes in close games",
  "every make by number 11",
  "when Team Cali took the lead",
  "every Nick Taubes three",
  "all HRS makes vs Emerald",
  "Lily Hamblin in close games",
];
let curQ=null, RESULTS=[], _phi=0;
const TAG = {"3PT Make":"3PT","2PT Make":"2PT","Free Throw":"FT","Steal":"STEAL","Block":"BLOCK","Assist":"ASSIST","Assist (2PT)":"ASSIST","Rebound":"REB","Off. Rebound":"REB"};
const el=(h)=>{const d=document.createElement('div');d.innerHTML=h.trim();return d.firstChild;};
const hero=document.getElementById('hero'), results=document.getElementById('results'), chipsEl=document.getElementById('chips'), qEl=document.getElementById('q');

const bar=document.querySelector('.searchbar');
qEl.addEventListener('keydown',e=>{if(e.key==='Enter')run();if(e.key==='Escape')goHome();});
qEl.addEventListener('input',()=>bar.classList.toggle('has',!!qEl.value.trim()));

function goHome(){
  curQ=null;
  hero.className='hero home'; results.innerHTML=''; qEl.value=''; bar.classList.remove('has');
  renderChips(false); qEl.focus();
}
function renderChips(compact){
  chipsEl.innerHTML='';
  if(compact) chipsEl.appendChild(el(`<div class="chiplabel">Try</div>`));
  CHIPS.forEach(c=>{
    const on = c.t===curQ;
    const b=el(`<div class="chip${on?' on':''}">${c.t}</div>`);
    b.onclick=()=> on ? goHome() : (qEl.value=c.t, run());  // click active chip = deselect
    chipsEl.appendChild(b);
  });
}
renderChips(false);

// rotate the placeholder to show off natural-language moment search (pauses while typing)
qEl.placeholder=PLACEHOLDERS[0];
setInterval(()=>{
  if(qEl.value||document.activeElement===qEl||hero.className.includes('results'))return;
  _phi=(_phi+1)%PLACEHOLDERS.length;
  qEl.style.transition='opacity .25s'; qEl.style.opacity='0';
  setTimeout(()=>{qEl.placeholder=PLACEHOLDERS[_phi];qEl.style.opacity='1';},250);
},3200);

async function run(){
  const q=qEl.value.trim(); if(!q) return;
  curQ=q;
  bar.classList.add('has');
  hero.className='hero results';
  renderChips(true);
  results.innerHTML=`<div class="status">Searching…</div><div class="clipgrid"></div>`;
  const grid=results.querySelector('.clipgrid'), status=results.querySelector('.status');
  try{
    const d=await fetch('/api/search?q='+encodeURIComponent(q)).then(r=>r.json());
    const rs=d.results||[];
    if(!rs.length){status.textContent='';grid.innerHTML=`<div class="empty">No clips for “${q}”. Try a player, team, play type, or “go-ahead”.</div>`;return;}
    status.textContent=`${rs.length} clip${rs.length>1?'s':''} for “${q}”`;
    RESULTS=rs;
    grid.innerHTML='';
    rs.forEach((c,i)=>{
      const who=[c.player,c.number?('#'+c.number):''].filter(Boolean).join(' ')||c.team||'Highlight';
      const tag=TAG[c.event]||(c.event||'').toUpperCase().slice(0,6);
      const ga=c.go_ahead?`<div class="ttag ga">⚡ GO-AHEAD</div>`:'';
      const card=el(`<div class="clip">
        <div class="thumb">${c.thumb?`<img loading="lazy" src="${c.thumb}"/>`:''}${tag?`<div class="ttag">${tag}</div>`:''}${ga}<div class="play"></div></div>
        <div class="meta"><div style="min-width:0"><div class="who">${who}</div><div class="mu">${c.matchup||c.team||''}</div></div>${c.score?`<div class="sc">${c.score}</div>`:''}</div>
      </div>`);
      card.onclick=()=>openFeed(RESULTS,i);
      grid.appendChild(card);
    });
  }catch(e){status.textContent='Error: '+e;}
}

// ---- TikTok-style clip feed (mirrors highlights.clippie.app) ----
let _obs=null,_active=-1,_raf=0,_muted=false;
const IC_PLAY='<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>';
const IC_PAUSE='<svg viewBox="0 0 24 24"><path d="M7 5h4v14H7zM13 5h4v14h-4z"/></svg>';
const IC_VOL='<svg viewBox="0 0 24 24"><path d="M4 9v6h4l5 5V4L8 9H4zm12.5 3a4.5 4.5 0 00-2.5-4.03v8.06A4.5 4.5 0 0016.5 12z"/></svg>';
const IC_MUTE='<svg viewBox="0 0 24 24"><path d="M4 9v6h4l5 5V4L8 9H4z"/><path d="M16 9.5l5 5m0-5l-5 5" stroke="#fff" stroke-width="1.8" stroke-linecap="round" fill="none"/></svg>';
const fmt=t=>{t=Math.max(0,t|0);return Math.floor(t/60)+':'+String(t%60).padStart(2,'0');};
const inits=s=>(s||'?').split(/\s+/).filter(Boolean).slice(0,2).map(w=>w[0]).join('').toUpperCase();

function slideHTML(c,i){
  const who=[c.player,c.number?('#'+c.number):''].filter(Boolean).join(' ')||c.team||'Highlight';
  const av=c.player?inits(c.player):(c.number?('#'+c.number):inits(c.team));
  const tag=TAG[c.event]||(c.event||'').toUpperCase().slice(0,6);
  const tags=`${tag?`<span class="t">${tag}</span>`:''}${c.go_ahead?'<span class="t ga">⚡ GO-AHEAD</span>':''}`;
  return `<div class="slide" data-i="${i}">
    ${c.thumb?`<div class="ovbgimg" style="background-image:url('${c.thumb}')"></div>`:''}
    <div class="ovtag">${tags}</div>
    <div class="ovstagewrap" data-close="1">
      <div class="ovstage" data-act="toggle">
        <video playsinline preload="none" webkit-playsinline loop data-src="${c.video}"></video>
        <div class="ovbig"><div class="pc">${IC_PLAY}</div></div>
      </div>
      <div class="ovctrls" data-stop="1">
        <button class="ic pp" data-act="toggle">${IC_PAUSE}</button>
        <div class="ovbar" data-stop="1"><div class="track"><div class="ovbarf"></div></div></div>
        <span class="ovtime">0:00</span>
        <button class="ic mute" data-act="mute">${IC_VOL}</button>
      </div>
    </div>
    <div class="ovbody" data-stop="1">
      <div class="ovhead">
        <div class="ovav">${av}</div>
        <div class="ovid"><div class="ovname">${who}</div><div class="ovhandle">${c.matchup||c.team||''}</div></div>
        ${c.score?`<div class="ovsc">${c.score}</div>`:''}
      </div>
    </div>
    ${i===0&&RESULTS.length>1?'<div class="swipehint">Swipe up for the next clip ↑</div>':''}
  </div>`;
}
function openFeed(list,start){
  RESULTS=list;
  const feed=document.getElementById('feed');
  feed.innerHTML=list.map((c,i)=>slideHTML(c,i)).join('');
  document.getElementById('ov').classList.add('on');
  document.body.style.overflow='hidden';
  if(_obs)_obs.disconnect();
  _obs=new IntersectionObserver(onIntersect,{root:feed,threshold:0.55});
  feed.querySelectorAll('.slide').forEach(s=>_obs.observe(s));
  _active=-1;
  const t=feed.children[start]; if(t)feed.scrollTop=t.offsetTop;
  setActive(start);
  cancelAnimationFrame(_raf);_raf=requestAnimationFrame(tick);
  document.addEventListener('keydown',feedKey);
  feed.addEventListener('click',feedClick);
}
function onIntersect(es){let best=null;for(const e of es){if(e.isIntersecting&&(!best||e.intersectionRatio>best.intersectionRatio))best=e;}if(best){const i=+best.target.dataset.i;if(i!==_active)setActive(i);}}
function setActive(i){
  _active=i;
  document.querySelectorAll('#feed .slide').forEach(s=>{
    const si=+s.dataset.i,v=s.querySelector('video'),stage=s.querySelector('.ovstage');
    if(Math.abs(si-i)<=1){if(!v.src&&v.dataset.src)v.src=v.dataset.src;}
    else if(v.src){try{v.pause();}catch(_){}v.removeAttribute('src');v.load();}
    if(si===i){
      v.muted=_muted;
      v.onplay=()=>{stage.classList.add('playing');s.querySelector('.pp').innerHTML=IC_PAUSE;};
      v.onpause=()=>{stage.classList.remove('playing');s.querySelector('.pp').innerHTML=IC_PLAY;};
      const p=v.play();if(p&&p.catch)p.catch(()=>{v.muted=true;_muted=true;s.querySelector('.mute').innerHTML=IC_MUTE;v.play().catch(()=>{});});
      s.querySelector('.mute').innerHTML=v.muted?IC_MUTE:IC_VOL;
    }else{try{v.pause();v.currentTime=0;}catch(_){}}
  });
}
function tick(){const s=document.querySelector(`#feed .slide[data-i="${_active}"]`);if(s){const v=s.querySelector('video'),f=s.querySelector('.ovbarf'),t=s.querySelector('.ovtime');if(v&&v.duration){f.style.width=(v.currentTime/v.duration*100)+'%';t.textContent=fmt(v.currentTime);}}_raf=requestAnimationFrame(tick);}
function feedKey(e){
  if(e.key==='Escape'){closeFeed();return;}
  if(e.key==='ArrowDown'||e.key==='ArrowUp'){e.preventDefault();
    const d=e.key==='ArrowDown'?1:-1,ni=Math.max(0,Math.min(RESULTS.length-1,_active+d));
    const t=document.querySelector(`#feed .slide[data-i="${ni}"]`);if(t)t.scrollIntoView({behavior:'smooth',block:'start'});}
}
function feedClick(e){
  const s=e.target.closest('.slide');if(!s)return;
  const act=e.target.closest('[data-act]'),stop=e.target.closest('[data-stop]'),close=e.target.closest('[data-close]');
  if(act){const a=act.dataset.act,v=s.querySelector('video');
    if(a==='toggle'){if(v.paused)v.play().catch(()=>{});else v.pause();}
    else if(a==='mute'){_muted=!_muted;v.muted=_muted;s.querySelector('.mute').innerHTML=v.muted?IC_MUTE:IC_VOL;}
    return;}
  if(close&&!stop){closeFeed();}
}
function closeFeed(){
  document.getElementById('ov').classList.remove('on');
  document.body.style.overflow='';
  cancelAnimationFrame(_raf);
  if(_obs)_obs.disconnect();
  document.removeEventListener('keydown',feedKey);
  document.querySelectorAll('#feed video').forEach(v=>{try{v.pause();}catch(_){}v.removeAttribute('src');v.load();});
  document.getElementById('feed').innerHTML='';
}
qEl.focus();
</script>
